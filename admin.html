<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos X - Panel Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        :root { --azul: #3b82f6; --fondo: #0a0a0a; --caja: #161616; --verde: #10b981; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--fondo); color: white; margin: 0; padding: 20px; }
        
        /* Login */
        #login-screen { position: fixed; inset: 0; background: var(--fondo); z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .input-pin { background: var(--caja); border: 1px solid #333; color: white; padding: 15px; border-radius: 12px; width: 320px; text-align: center; margin-bottom: 20px; font-size: 14px;}
        .input-pin:focus { outline: none; border-color: var(--azul); }
        .btn-pin { background: var(--azul); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 320px; text-transform: uppercase; transition: 0.3s; }

        /* Panel Principal */
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 20px; margin-bottom: 30px; }
        .header-left { display: flex; align-items: center; gap: 20px; }
        h1 { margin: 0; font-size: 24px; letter-spacing: 1px; }
        h1 span { color: var(--azul); }
        
        .btn-refresh { background: #222; color: #fff; border: 1px solid #444; padding: 10px 15px; border-radius: 8px; cursor: pointer; transition: 0.3s; font-size: 14px; font-weight: bold; display: flex; align-items: center; gap: 8px; text-transform: uppercase; }
        .btn-refresh:hover { background: #333; border-color: var(--azul); color: var(--azul); }
        .btn-logout { background: transparent; color: #888; border: 1px solid #444; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: bold; text-transform: uppercase; transition: 0.3s; }
        .btn-logout:hover { background: #ef4444; color: white; border-color: #ef4444; }

        .ticket-card { background: var(--caja); border: 1px solid #333; border-radius: 15px; padding: 20px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .ticket-info h3 { margin: 0 0 5px 0; color: #fff; font-size: 18px; }
        .ticket-info p { margin: 0; color: #888; font-size: 14px; }
        .badge-tipo { display: inline-block; padding: 3px 10px; border-radius: 10px; font-size: 12px; font-weight: bold; background: #333; margin-top: 12px; }
        
        .action-buttons { display: flex; gap: 10px; align-items: center; }
        .btn-aprobar { background: var(--verde); color: #000; border: none; padding: 12px 25px; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; text-transform: uppercase; font-size: 13px; }
        .btn-aprobar:hover { background: #059669; color: white; }
        .btn-rechazar { background: transparent; color: #ef4444; border: 1px solid #ef4444; padding: 10px 15px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 13px; transition: 0.3s; }
        .btn-rechazar:hover { background: rgba(239, 68, 68, 0.1); }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1 style="margin-bottom: 20px;">ADMIN <span>X</span></h1>
        <p style="color: #888; font-size: 13px; margin-bottom: 25px; text-align: center; max-width: 300px;">Ingresá el PIN de Finanzas para continuar.</p>
        
        <input type="password" id="pinInput" class="input-pin" placeholder="PIN de Seguridad">
        <button class="btn-pin" id="btn-login" onclick="checkPin()">Conectar y Acceder</button>
    </div>

    <div id="main-interface" style="display: none; max-width: 900px; margin: 0 auto;">
        <div class="header">
            <div class="header-left">
                <button class="btn-refresh" onclick="cargarPendientes()">↻ Refrescar</button>
                <h1>ADMIN <span>X</span></h1>
            </div>
            <div style="display: flex; align-items: center; gap: 20px;">
                <div style="color: #888; font-size: 15px;">Pendientes: <span id="contador-pendientes" style="color: white; font-weight: bold; font-size: 18px;">0</span></div>
                <button class="btn-logout" onclick="cerrarSesion()">Cerrar Sesión</button>
            </div>
        </div>

        <div id="lista-pendientes"></div>
    </div>

    <script>
        const supabaseUrl = 'https://vogizootbnhvbeugroyr.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZvZ2l6b290Ym5odmJldWdyb3lyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MzY3MTAsImV4cCI6MjA5MDIxMjcxMH0.7dNueBWtcx0nUHjligZl4hS72qqlswuYw0WYR0QeVhI';
        const client = window.supabase.createClient(supabaseUrl, supabaseKey);
        emailjs.init("fTAOcJXUAi8-UKPu2"); 

        window.onload = async () => {
            const pinGuardado = localStorage.getItem('pin_admin_x');
            if (pinGuardado) {
                // Chequeo silencioso contra la base de datos
                const { error } = await client.rpc('get_pendientes', { pin_seguridad: pinGuardado });
                if (!error) {
                    iniciarPanel();
                } else {
                    localStorage.removeItem('pin_admin_x');
                }
            }
        }

        async function checkPin() {
            const inputVal = document.getElementById('pinInput').value.trim();
            const btn = document.getElementById('btn-login');
            
            if(!inputVal) return;

            btn.innerText = "Verificando...";
            btn.disabled = true;
            btn.style.opacity = "0.5";

            // Intentamos traer datos usando el PIN ingresado
            const { error } = await client.rpc('get_pendientes', { pin_seguridad: inputVal });

            if (error) {
                alert("❌ PIN INCORRECTO. Acceso denegado.");
                document.getElementById('pinInput').value = "";
                btn.innerText = "Conectar y Acceder";
                btn.disabled = false;
                btn.style.opacity = "1";
            } else {
                localStorage.setItem('pin_admin_x', inputVal);
                iniciarPanel();
            }
        }

        function iniciarPanel() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-interface').style.display = 'block';
            cargarPendientes();
        }

        function cerrarSesion() {
            localStorage.removeItem('pin_admin_x');
            location.reload(); 
        }

        async function cargarPendientes() {
            const lista = document.getElementById('lista-pendientes');
            const btnRefresh = document.querySelector('.btn-refresh');
            const pinGuardado = localStorage.getItem('pin_admin_x');
            
            btnRefresh.innerText = "Cargando...";
            btnRefresh.style.opacity = "0.5";
            lista.innerHTML = "<p style='text-align:center; color:#888;'>Buscando reservas...</p>";

            const { data, error } = await client.rpc('get_pendientes', { pin_seguridad: pinGuardado });
            
            btnRefresh.innerText = "↻ Refrescar";
            btnRefresh.style.opacity = "1";

            if (error) { 
                lista.innerHTML = "<p style='text-align:center; color:#ef4444;'>❌ Sesión expirada o error de conexión.</p>"; 
                return; 
            }
            
            document.getElementById('contador-pendientes').innerText = data.length;

            if (data.length === 0) {
                lista.innerHTML = "<p style='text-align:center; color:#888; margin-top: 40px; font-size: 18px;'>No hay reservas pendientes de pago. Todo al día. ✅</p>";
                return;
            }

            lista.innerHTML = "";
            data.forEach(entrada => {
                const isVIP = entrada.tipo_entrada.includes('VIP');
                const colorBadge = isVIP ? 'background:#eab308; color:#000;' : 'background:#333; color:#fff;';

                let fechaFormateada = "Fecha no disponible";
                if (entrada.created_at) {
                    const fechaObj = new Date(entrada.created_at);
                    const fechaStr = fechaObj.toLocaleDateString('es-AR', { day: '2-digit', month: '2-digit', year: 'numeric' });
                    const horaStr = fechaObj.toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' });
                    fechaFormateada = `${fechaStr} a las ${horaStr} hs`;
                }

                const card = `
                    <div class="ticket-card" id="card-${entrada.id}">
                        <div class="ticket-info">
                            <h3>${entrada.nombre} ${entrada.apellido}</h3>
                            <p style="margin-bottom: 4px;">DNI: ${entrada.dni} | Email: ${entrada.email}</p>
                            <p style="color: #666; font-size: 13px; font-weight: bold;">🕒 Solicitado: ${fechaFormateada}</p>
                            <span class="badge-tipo" style="${colorBadge}">${entrada.tipo_entrada}</span>
                        </div>
                        <div class="action-buttons">
                            <button class="btn-aprobar" onclick="aprobarPago('${entrada.id}', '${entrada.nombre}', '${entrada.apellido}', '${entrada.email}', '${entrada.tipo_entrada}')">Aprobar y Enviar QR</button>
                            <button class="btn-rechazar" onclick="rechazarReserva('${entrada.id}')">Borrar</button>
                        </div>
                    </div>
                `;
                lista.innerHTML += card;
            });
        }

        async function aprobarPago(id, nombre, apellido, email, tipo) {
            const btn = document.querySelector(`#card-${id} .btn-aprobar`);
            const pinGuardado = localStorage.getItem('pin_admin_x');
            btn.innerText = "Enviando...";
            btn.disabled = true;

            try {
                await emailjs.send("service_6r4tg5n", "template_7xurzc2", {
                    nombre_cliente: nombre,
                    apellido_cliente: apellido,
                    email_cliente: email,
                    tipo_entrada: tipo,
                    id_entrada: id
                });

                const { error } = await client.rpc('aprobar_ticket', { ticket_id: id, pin_seguridad: pinGuardado });
                if (error) throw error;

                document.getElementById(`card-${id}`).remove();
                let conteoActual = parseInt(document.getElementById('contador-pendientes').innerText);
                document.getElementById('contador-pendientes').innerText = Math.max(0, conteoActual - 1);

            } catch (error) {
                alert("Error al procesar: " + error.message);
                btn.innerText = "Aprobar y Enviar QR";
                btn.disabled = false;
            }
        }

        async function rechazarReserva(id) {
            if(confirm("¿Seguro que querés borrar esta reserva? Liberará el cupo de la entrada.")){
                const pinGuardado = localStorage.getItem('pin_admin_x');
                await client.rpc('borrar_ticket', { ticket_id: id, pin_seguridad: pinGuardado });
                cargarPendientes();
            }
        }
    </script>
</body>
</html>
